<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <nav>
            <a href="index.html">HOME</a> | 
            <a href="contacto.html">CONTACTO</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <form class="formulario">

            <div class="fila">
                <label>Nombre:</label>
                <input type="text">
            </div>

            <div class="fila">
                <label>E-mail:</label>
                <input type="email">
            </div>

            <div class="fila">
                <label>Tel:</label>
                <input type="text">
            </div>

            <div class="fila">
                <label>Mensaje:</label>
                <textarea></textarea>
            </div>

            <div class="botones">
                <button type="submit" class="enviar">Enviar</button>
                <button type="reset" class="cancelar">Cancelar</button>
            </div>

        </form>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>Todos los derechos reservados</p>
    </footer>

</div>

</body>
</html>
